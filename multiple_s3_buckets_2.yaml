AWSTemplateFormatVersion: '2010-09-09'
# Order is critical: Extensions must resolve the loop BEFORE SAM tries to read the template
Transform: 
  - AWS::LanguageExtensions
  - AWS::Serverless-2016-10-31

Resources:
  # 1. Generate the encrypted DynamoDB tables
  Fn::ForEach::Tables:
    - TableIdentifier
    - ["Users", "Orders"]
    - "${TableIdentifier}Table":
        Type: AWS::DynamoDB::Table
        Properties:
          TableName: !Sub "App-${TableIdentifier}"
          AttributeDefinitions:
            - AttributeName: "id"
              AttributeType: "S"
          KeySchema:
            - AttributeName: "id"
              KeyType: "HASH"
          BillingMode: PAY_PER_REQUEST
          SSESpecification:
            SSEEnabled: true
            SSEType: "KMS"

  # 2. Add a SAM Serverless Function
  ProcessDataFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      Runtime: nodejs18.x
      InlineCode: |
        const AWS = require('aws-sdk');
        exports.handler = async (event) => { console.log("Processing..."); };
      Policies:
        # SAM turns this short policy into a full IAM Role during transformation
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable # Referencing a name generated by the loop
